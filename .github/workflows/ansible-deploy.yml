name: Ansible Deployment

on:
  push:
    branches: [main, master]
    paths:
      - 'ansible/**'
      - '!ansible/docs/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'ansible/**'
      - '!ansible/docs/**'
      - '.github/workflows/ansible-deploy.yml'

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core==2.18.*" ansible-lint

      - name: Install required Ansible collections
        run: |
          ansible-galaxy collection install -r ansible/collections/requirements.yml

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/*.yml

  deploy:
    name: Deploy Application
    needs: lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "ansible-core==2.18.*"
          ansible-galaxy collection install -r ansible/collections/requirements.yml

      - name: Configure SSH access
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts

      - name: Build CI inventory
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
        run: |
          cat > ansible/inventory/ci-hosts.ini <<INVENTORY
          [webservers]
          target ansible_host=${VM_HOST} ansible_user=${VM_USER} ansible_python_interpreter=/usr/bin/python3

          [webservers:vars]
          ansible_ssh_private_key_file=~/.ssh/id_rsa
          INVENTORY

      - name: Deploy with Ansible
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          printf '%s' "$ANSIBLE_VAULT_PASSWORD" > /tmp/vault_pass
          cd ansible
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook playbooks/deploy.yml \
            -i inventory/ci-hosts.ini \
            --vault-password-file /tmp/vault_pass
          rm -f /tmp/vault_pass

      - name: Verify deployment
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
        run: |
          sleep 10
          curl -f "http://${VM_HOST}:5000/"
          curl -f "http://${VM_HOST}:5000/health"
