replicaCount: 3

nameOverride: ""
fullnameOverride: ""

image:
  repository: devops-info-service-python
  tag: "lab10"
  pullPolicy: IfNotPresent

revisionHistoryLimit: 5

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

podAnnotations: {}
podLabels: {}

env:
  host: "0.0.0.0"
  port: "5000"
  appEnv: "lab10"
  appRevision: "v1"
  extra: []

service:
  type: NodePort
  port: 80
  targetPort: http
  containerPort: 5000
  nodePort: 30080
  annotations: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

startupProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 2
  periodSeconds: 3
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

hooks:
  enabled: true
  image:
    repository: devops-info-service-python
    tag: "lab10"
    pullPolicy: IfNotPresent
  deletePolicy: before-hook-creation,hook-succeeded
  backoffLimit: 0
  preInstall:
    enabled: true
    sleepSeconds: 5
    weight: -5
  postInstall:
    enabled: true
    sleepSeconds: 5
    weight: 5
