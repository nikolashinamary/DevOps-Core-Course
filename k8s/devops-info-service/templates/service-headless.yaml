{{- if and (eq .Values.workload.kind "StatefulSet") .Values.service.headless }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info-service.headlessServiceName" . }}
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "devops-info-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
{{- end }}
