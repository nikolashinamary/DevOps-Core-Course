fullnameOverride: devops-info-service-init-wait

replicaCount: 1

image:
  tag: "lab12"

env:
  appEnv: lab16-init-wait
  appRevision: lab16-init

service:
  type: NodePort
  nodePort: 30097

hooks:
  enabled: false

initContainers:
  - name: wait-for-service
    image: busybox:1.36
    command:
      - sh
      - -c
      - >
        until nslookup devops-info-service-dependency.lab16-wait.svc.cluster.local;
        do echo waiting for dependency; sleep 2; done

monitoring:
  serviceMonitor:
    enabled: false
