replicaCount: 3

image:
  tag: "lab12"

env:
  appEnv: prod
  appRevision: prod

service:
  type: NodePort
  nodePort: 30084

resources:
  requests:
    cpu: 150m
    memory: 192Mi
  limits:
    cpu: 300m
    memory: 384Mi

livenessProbe:
  initialDelaySeconds: 20
  periodSeconds: 5

readinessProbe:
  initialDelaySeconds: 8
  periodSeconds: 3
