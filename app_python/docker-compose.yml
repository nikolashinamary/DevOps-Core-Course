services:
  devops-info-service:
    build:
      context: .
    image: devops-info-service-python:lab12
    container_name: devops-info-service-python
    environment:
      HOST: 0.0.0.0
      PORT: 5000
      APP_ENV: local-compose
      VISITS_FILE: /app/data/visits
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
