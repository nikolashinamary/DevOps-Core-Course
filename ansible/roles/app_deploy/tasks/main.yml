---
- name: Create application directory
  ansible.builtin.file:
    path: /opt/{{ app_name }}
    state: directory
    mode: '0755'
  tags:
    - app
    - directories

- name: Render application env file
  ansible.builtin.copy:
    dest: "/opt/{{ app_name }}/.env"
    mode: "0600"
    content: |
      {% for key, value in app_environment.items() %}
      {{ key }}={{ value }}
      {% endfor %}
  notify: restart app
  tags:
    - app
    - config

- name: Login to Docker Hub
  ansible.builtin.command:
    cmd: "docker login --username {{ dockerhub_username }} --password-stdin"
    stdin: "{{ dockerhub_password }}"
  no_log: true
  changed_when: false
  when:
    - dockerhub_username is defined
    - dockerhub_password is defined
    - dockerhub_username | length > 0
    - dockerhub_password | length > 0
  tags:
    - app
    - auth
    - docker

- name: Pull Docker image
  ansible.builtin.command:
    cmd: "docker pull {{ docker_image }}:{{ docker_image_tag }}"
  register: pulled_image
  changed_when: >
    'Downloaded newer image' in (pulled_image.stdout + pulled_image.stderr)
    or 'Pull complete' in (pulled_image.stdout + pulled_image.stderr)
  tags:
    - app
    - pull
    - docker

- name: Inspect existing container
  ansible.builtin.command:
    cmd: "docker ps -a --filter name=^/{{ app_container_name }}$ --format {{ '{{.Image}}|{{.Status}}' }}"
  register: app_container_state
  changed_when: false
  tags:
    - app
    - check
    - docker

- name: Calculate container state flags
  ansible.builtin.set_fact:
    app_desired_image: "{{ docker_image }}:{{ docker_image_tag }}"
    app_container_exists: "{{ app_container_state.stdout | trim | length > 0 }}"
    app_container_image: "{{ (app_container_state.stdout | trim).split('|')[0] if app_container_state.stdout | trim | length > 0 else '' }}"
    app_container_running: "{{ 'Up ' in app_container_state.stdout }}"
  tags:
    - app
    - check

- name: Remove outdated container
  ansible.builtin.command:
    cmd: "docker rm -f {{ app_container_name }}"
  when:
    - app_container_exists
    - pulled_image.changed or app_container_image != app_desired_image
  tags:
    - app
    - remove
    - docker

- name: Start existing container
  ansible.builtin.command:
    cmd: "docker start {{ app_container_name }}"
  when:
    - app_container_exists
    - app_container_image == app_desired_image
    - not app_container_running
    - not pulled_image.changed
  tags:
    - app
    - start
    - docker

- name: Run application container
  ansible.builtin.command:
    cmd: >-
      docker run -d
      --name {{ app_container_name }}
      --restart {{ docker_restart_policy }}
      --env-file /opt/{{ app_name }}/.env
      -p {{ app_host_port }}:{{ app_port }}
      {{ docker_image }}:{{ docker_image_tag }}
  when:
    - pulled_image.changed or not app_container_exists or app_container_image != app_desired_image
  tags:
    - app
    - deploy
    - docker

- name: Wait for application to start
  ansible.builtin.wait_for:
    port: "{{ app_port }}"
    host: "127.0.0.1"
    delay: 5
    timeout: "{{ app_health_check_timeout }}"
  tags:
    - app
    - wait
    - health

- name: Check application health endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ app_port }}{{ app_health_check_path }}"
    method: GET
    status_code: 200
    timeout: 10
  register: health_check
  until: health_check.status == 200
  retries: 12
  delay: 5
  tags:
    - app
    - health
    - verification

- name: Display health check result
  ansible.builtin.debug:
    msg: "Application is healthy! Response: {{ health_check.json | default('No JSON response') }}"
  when: health_check.status == 200
  tags:
    - app
    - debug
