---
- name: Install prerequisites for Docker
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - gnupg-agent
      - software-properties-common
    state: present
    update_cache: yes
    lock_timeout: 600
    update_cache_retries: 10
    update_cache_retry_max_delay: 30
  tags:
    - docker
    - prerequisites

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  tags:
    - docker
    - gpg

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: "{{ docker_repository_key_url }}"
    dest: "{{ docker_repository_keyring }}"
    mode: "0644"
  tags:
    - docker
    - gpg

- name: Remove old Docker repository entry from /etc/apt/sources.list
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list
    regexp: '^deb .*download\.docker\.com/linux/ubuntu.*$'
    state: absent
  failed_when: false
  tags:
    - docker
    - repository

- name: Find apt source list files
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "*.list"
    file_type: file
  register: apt_list_files
  tags:
    - docker
    - repository

- name: Remove stale Docker repository entries from sources.list.d
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    regexp: '^deb .*download\.docker\.com/linux/ubuntu.*$'
    state: absent
  loop: "{{ apt_list_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  tags:
    - docker
    - repository

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "{{ docker_repository }}"
    filename: docker
    state: present
    update_cache: yes
  tags:
    - docker
    - repository

- name: Update apt cache after adding Docker repo
  ansible.builtin.apt:
    update_cache: yes
    lock_timeout: 600
    update_cache_retries: 10
    update_cache_retry_max_delay: 30
  tags:
    - docker
    - cache

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    lock_timeout: 600
  notify:
    - Restart docker
  tags:
    - docker
    - install

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: yes
  tags:
    - docker
    - service

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: yes
  loop: "{{ docker_users }}"
  tags:
    - docker
    - users

- name: Install Docker SDK for Python
  ansible.builtin.apt:
    name: python3-docker
    state: present
    lock_timeout: 600
  tags:
    - docker
    - python
