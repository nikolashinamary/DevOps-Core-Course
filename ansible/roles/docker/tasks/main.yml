---
- name: Install Docker engine
  block:
    - name: Install prerequisites for Docker
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - gnupg-agent
          - software-properties-common
        state: present
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 600
        update_cache_retries: 10
        update_cache_retry_max_delay: 30

    - name: Ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: "{{ docker_repository_key_url }}"
        dest: "{{ docker_repository_keyring }}"
        mode: "0644"

    - name: Remove old Docker repository entry from /etc/apt/sources.list
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: '^deb .*download\.docker\.com/linux/ubuntu.*$'
        state: absent
      failed_when: false

    - name: Find apt source list files
      ansible.builtin.find:
        paths: /etc/apt/sources.list.d
        patterns: "*.list"
        file_type: file
      register: apt_list_files

    - name: Remove stale Docker repository entries from sources.list.d
      ansible.builtin.lineinfile:
        path: "{{ item.path }}"
        regexp: '^deb .*download\.docker\.com/linux/ubuntu.*$'
        state: absent
      loop: "{{ apt_list_files.files }}"
      loop_control:
        label: "{{ item.path }}"
      when: item.path != "/etc/apt/sources.list.d/docker.list"

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "{{ docker_repository }}"
        filename: docker
        state: present
        update_cache: true

    - name: Update apt cache after adding Docker repository
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 600
        update_cache_retries: 10
        update_cache_retry_max_delay: 30

    - name: Install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        lock_timeout: 600
      notify:
        - Restart docker

  rescue:
    - name: Wait before retrying Docker apt repository setup
      ansible.builtin.wait_for:
        timeout: 10

    - name: Retry apt cache update
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        lock_timeout: 600
        update_cache_retries: 10
        update_cache_retry_max_delay: 30

    - name: Retry Docker GPG key installation
      ansible.builtin.get_url:
        url: "{{ docker_repository_key_url }}"
        dest: "{{ docker_repository_keyring }}"
        mode: "0644"

    - name: Retry Docker package installation
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        lock_timeout: 600

  become: true
  tags:
    - docker
    - docker_install

- name: Configure Docker runtime
  block:
    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users | unique }}"

    - name: Install Docker SDK for Python
      ansible.builtin.apt:
        name: python3-docker
        state: present
        lock_timeout: 600

  always:
    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

  become: true
  tags:
    - docker
    - docker_config
