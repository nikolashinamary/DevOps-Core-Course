---
docker_users:
  - ubuntu
  - "{{ ansible_user }}"

docker_version: ""

docker_repository_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf

docker_repository_arch: "{{ docker_repository_arch_map.get(ansible_architecture, 'amd64') }}"
docker_repository_keyring: "/etc/apt/keyrings/docker.asc"
docker_repository_key_url: "https://download.docker.com/linux/ubuntu/gpg"
docker_repository: "deb [arch={{ docker_repository_arch }} signed-by={{ docker_repository_keyring }}] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
