---
- name: Wipe web application
  block:
    - name: Check whether compose file exists
      ansible.builtin.stat:
        path: "{{ compose_project_dir }}/docker-compose.yml"
      register: web_app_compose_file

    - name: Stop and remove Docker Compose services
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        files:
          - docker-compose.yml
        state: absent
        remove_orphans: true
      when: web_app_compose_file.stat.exists

    - name: Remove docker-compose file
      ansible.builtin.file:
        path: "{{ compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: Remove application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: absent

    - name: Log wipe completion
      ansible.builtin.debug:
        msg: "Application {{ app_name }} wiped successfully."

  when: web_app_wipe | bool
  tags:
    - web_app_wipe
