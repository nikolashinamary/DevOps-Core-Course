---
# Wipe logic is included first to support clean reinstall flows.
- name: Include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - web_app_wipe

- name: Deploy application with Docker Compose
  block:
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: "0755"

    - name: Login to Docker Hub
      ansible.builtin.command:
        cmd: "docker login --username {{ dockerhub_username }} --password-stdin"
        stdin: "{{ dockerhub_password }}"
      no_log: true
      changed_when: false
      when:
        - dockerhub_username is defined
        - dockerhub_password is defined
        - dockerhub_username | length > 0
        - dockerhub_password | length > 0

    - name: Template Docker Compose manifest
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Deploy containers with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        files:
          - docker-compose.yml
        pull: always
        state: present
      register: web_app_compose_up

    - name: Wait for application port
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ app_port }}"
        delay: 5
        timeout: "{{ app_health_check_timeout }}"

    - name: Check application health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}{{ app_health_check_path }}"
        method: GET
        status_code: 200
        timeout: 10
      register: web_app_health_check
      until: web_app_health_check.status == 200
      retries: 12
      delay: 5

    - name: Display health check result
      ansible.builtin.debug:
        msg: "Application is healthy. Compose changed={{ web_app_compose_up.changed }}"

  rescue:
    - name: Show deployment failure context
      ansible.builtin.debug:
        msg: "Docker Compose deployment failed for {{ app_name }}."

    - name: Show compose status after failure
      ansible.builtin.command:
        cmd: "docker compose -f {{ compose_project_dir }}/docker-compose.yml ps"
      register: web_app_compose_ps
      changed_when: false
      failed_when: false

    - name: Print compose status output
      ansible.builtin.debug:
        var: web_app_compose_ps.stdout_lines

  become: true
  tags:
    - app_deploy
    - compose
